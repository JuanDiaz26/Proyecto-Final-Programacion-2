<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel RRHH · Empleados</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- FUENTES DE GOOGLE -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- BOOTSTRAP (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- NUESTROS ESTILOS -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <!-- BARRA DE ARRIBA -->
  <header class="topbar">
    <div class="container topbar-inner">
      <!-- EL NOMBRE DE LA APP -->
      <div class="wordmark">
        <span class="wordmark-name">Panel RRHH</span>
        <span class="wordmark-tag">Administración</span>
      </div>
      <!-- LAS TABS (LAS MANEJA EL JS, NO LLEVAN LINK) -->
      <nav class="tabs" aria-label="Secciones">
        <span class="tab" data-nav="departamentos">Departamentos</span>
        <span class="tab is-active" data-nav="empleados" aria-current="page">Empleados</span>
        <span class="tab" data-nav="asistencias">Asistencias</span>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- EL BOTON VOLVER LO MANEJA EL JS -->
    <button id="botonVolver" class="back">← Volver a departamentos</button>

    <div class="page-head">
      <div class="page-head-text">
        <p class="kicker">RRHH — Empleados</p>
        <!-- ACA EL JS PONE EL NOMBRE DEL DEPTO -->
        <h1 class="page-title" id="tituloDepartamento">Empleados</h1>
        <p class="page-subtitle">Empleados que pertenecen al departamento seleccionado.</p>
      </div>
    </div>

    <!-- FORM PARA CREAR UN EMPLEADO -->
    <form id="formEmpleado" class="toolbar">
      <input id="nombre" class="field" placeholder="Nombre" required />
      <input id="cargo" class="field" placeholder="Cargo" required />
      <input id="fechaIngreso" type="date" class="field" required />
      <button type="submit" class="button primary">+ Agregar empleado</button>
    </form>

    <!-- ACA EL JS DIBUJA LAS TARJETAS (ARRANCA VACIO) -->
    <div id="listaEmpleados" class="cards"></div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-col">
        <span class="footer-wordmark">Panel RRHH</span>
        <span class="footer-kicker">Programación 2 · 2026</span>
      </div>

      <nav class="footer-col footer-nav" aria-label="Navegación del pie">
        <span class="footer-label">Secciones</span>
        <span class="foot-link" data-nav="departamentos">Departamentos</span>
        <span class="foot-link" data-nav="empleados">Empleados</span>
        <span class="foot-link" data-nav="asistencias">Asistencias</span>
      </nav>

      <div class="footer-col footer-team">
        <span class="footer-label">Integrantes</span>
        <span class="footer-names">Juan Diaz · Luciano Bravo · Segura Heredia Constanza</span>
      </div>
    </div>
  </footer>

  <!-- AXIOS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- FUNCIONES COMPARTIDAS -->
  <script src="js/utils.js"></script>
  <!-- EL JS DE ESTA PAGINA -->
  <script src="js/empleados.js"></script>
</body>
</html>
