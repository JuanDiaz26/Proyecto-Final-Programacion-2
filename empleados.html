<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel RRHH · Empleados</title>

  <!-- Bootstrap por CDN (base) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Tema propio -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <!-- Barra superior -->
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark">HR</div>
        <div class="brand-text">
          <span class="brand-name">Panel RRHH</span>
          <span class="brand-sub">Administración de empleados</span>
        </div>
      </div>
      <nav class="steps">
        <span class="step">Departamentos</span>
        <span class="step-sep">›</span>
        <span class="step active">Empleados</span>
        <span class="step-sep">›</span>
        <span class="step">Asistencias</span>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Botón "Volver": su comportamiento se asigna por JS -->
    <button id="botonVolver" class="back">← Volver a departamentos</button>

    <div class="page-head">
      <div>
        <!-- El JS escribe acá el nombre del departamento actual -->
        <h1 class="page-title" id="tituloDepartamento">Empleados</h1>
        <p class="page-subtitle">Empleados que pertenecen al departamento seleccionado.</p>
      </div>
    </div>

    <!-- Formulario para CREAR un empleado -->
    <form id="formEmpleado" class="toolbar">
      <input id="nombre" class="field" placeholder="Nombre" required />
      <input id="cargo" class="field" placeholder="Cargo" required />
      <input id="fechaIngreso" type="date" class="field" required />
      <button type="submit" class="button primary">+ Agregar empleado</button>
    </form>

    <!-- Contenedor VACÍO: el JavaScript dibuja acá las tarjetas -->
    <div id="listaEmpleados" class="cards"></div>
  </main>

  <!-- Axios por CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Nuestro código de esta página -->
  <script src="js/empleados.js"></script>
</body>
</html>
