<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel RRHH · Asistencias</title>

  <!-- Bootstrap por CDN (base) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Tema propio -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <!-- Barra superior -->
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark">HR</div>
        <div class="brand-text">
          <span class="brand-name">Panel RRHH</span>
          <span class="brand-sub">Administración de empleados</span>
        </div>
      </div>
      <nav class="steps">
        <span class="step">Departamentos</span>
        <span class="step-sep">›</span>
        <span class="step">Empleados</span>
        <span class="step-sep">›</span>
        <span class="step active">Asistencias</span>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Botón "Volver": su comportamiento se asigna por JS -->
    <button id="botonVolver" class="back">← Volver a empleados</button>

    <div class="page-head">
      <div>
        <!-- El JS escribe acá el nombre del empleado actual -->
        <h1 class="page-title" id="tituloEmpleado">Asistencias</h1>
        <p class="page-subtitle">Historial ordenado de la más reciente a la más antigua.</p>
      </div>
      <!-- Botón para CREAR una asistencia (fecha de hoy, estado "Presente") -->
      <button id="botonRegistrar" class="button primary">+ Registrar hoy</button>
    </div>

    <!-- Contenedor VACÍO: el JavaScript dibuja acá el historial -->
    <div id="listaAsistencias" class="stack"></div>
  </main>

  <!-- Axios por CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Nuestro código de esta página -->
  <script src="js/asistencias.js"></script>
</body>
</html>
