<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel RRHH · Asistencias</title>

  <!-- Favicon: monograma "RH" (fondo --ink, letra --paper) -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Google Fonts: Space Grotesk (títulos) · Inter (cuerpo) · JetBrains Mono (datos) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Bootstrap por CDN (solo como reset base) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Tema propio EDITORIAL (se carga al final: define toda la identidad visual) -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <!-- Barra superior -->
  <header class="topbar">
    <div class="container topbar-inner">
      <!-- Wordmark de texto (reemplaza al viejo logo "HR" con degradé) -->
      <div class="wordmark">
        <span class="wordmark-name">Panel RRHH</span>
        <span class="wordmark-tag">Administración</span>
      </div>
      <!-- Tabs como texto: la activa lleva subrayado de 2px (indicador, no navega) -->
      <nav class="tabs" aria-label="Secciones">
        <span class="tab">Departamentos</span>
        <span class="tab">Empleados</span>
        <span class="tab is-active" aria-current="page">Asistencias</span>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Botón "Volver": su comportamiento se asigna por JS -->
    <button id="botonVolver" class="back">← Volver a empleados</button>

    <div class="page-head">
      <div class="page-head-text">
        <p class="kicker">RRHH — Asistencias</p>
        <!-- El JS escribe acá el nombre del empleado actual -->
        <h1 class="page-title" id="tituloEmpleado">Asistencias</h1>
        <p class="page-subtitle">Historial ordenado de la más reciente a la más antigua.</p>
      </div>
      <!-- Botón para CREAR una asistencia (fecha de hoy, estado "Presente") -->
      <button id="botonRegistrar" class="button primary">+ Registrar hoy</button>
    </div>

    <!-- Contenedor VACÍO: el JavaScript dibuja acá el historial -->
    <div id="listaAsistencias" class="stack"></div>
  </main>

  <!-- Axios por CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Utilidades compartidas (API, fechas, errores) -->
  <script src="js/utils.js"></script>
  <!-- Nuestro código de esta página -->
  <script src="js/asistencias.js"></script>
</body>
</html>
