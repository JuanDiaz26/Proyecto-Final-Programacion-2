<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel RRHH · Departamentos</title>

  <!-- Bootstrap por CDN (base) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Tema propio (se carga después para darle el look moderno) -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <!-- Barra superior -->
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark">HR</div>
        <div class="brand-text">
          <span class="brand-name">Panel RRHH</span>
          <span class="brand-sub">Administración de empleados</span>
        </div>
      </div>
      <nav class="steps">
        <span class="step active">Departamentos</span>
        <span class="step-sep">›</span>
        <span class="step">Empleados</span>
        <span class="step-sep">›</span>
        <span class="step">Asistencias</span>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <div>
        <h1 class="page-title">Departamentos</h1>
        <p class="page-subtitle">Gestioná las áreas de la empresa y sus responsables.</p>
      </div>
    </div>

    <!-- Formulario para CREAR un departamento -->
    <form id="formDepartamento" class="toolbar">
      <input id="nombre" class="field" placeholder="Nombre del departamento" required />
      <input id="responsable" class="field" placeholder="Responsable" required />
      <button type="submit" class="button primary">+ Agregar departamento</button>
    </form>

    <!-- Contenedor VACÍO: el JavaScript dibuja acá las tarjetas -->
    <div id="listaDepartamentos" class="cards"></div>
  </main>

  <!-- Axios por CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Nuestro código de esta página -->
  <script src="js/departamentos.js"></script>
</body>
</html>
